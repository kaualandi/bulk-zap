services:
  postgres:
    image: postgres:16-alpine
    container_name: bulkzap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bulkzap
      POSTGRES_PASSWORD: bulkzap
      POSTGRES_DB: bulkzap
    ports:
      - "5432:5432"
    volumes:
      - bulkzap_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bulkzap"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  bulkzap_pg_data:
